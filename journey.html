<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Journies</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
  <link rel="stylesheet" href="journey.css">
</head>

<body>
  <main>
    <nav>
      <h3>RoadCity</h3>
      <button>Sign In</button>
    </nav>
    <div class="img-bg">
      <img src="Images/paris.jpg" alt="Back-pic">
      <div class="book-bg">
        <h1>SERVICES ACROSS 200+ CITIESS</h1>
        <div class="book">
          <div class="from">
            <h2>FROM</h2>
            <div class="search">
              <i class="fa-solid fa-magnifying-glass"></i>
              <input type="search" placeholder="Enter Pickup Location">
            </div>
          </div>
          <div class="TO">
            <h2>TO</h2>
            <div class="search">
              <i class="fa-solid fa-magnifying-glass"></i>
              <input type="search" placeholder="Enter Drop Location">
            </div>
          </div>
          <div class="PICK UP DATE">
            <h2>PICK UP DATE</h2>
            <input type="date">
          </div>
          <div class="PICK UP TIME">
            <h2>PICK UP TIME</h2>
            <input type="time">
          </div>
          <button>EXPLORE CABS</button>
        </div>
      </div>
    </div>

    <div class="view">

      <div class="stac">

        <div class="view-pt">
          <img src="Images/car.jpg" alt="car" />
          <div class="view-para">
            <h2>Car Rental Expert since</h2>
            <h2>2006</h2>
          </div>
        </div>

        <div class="view-pt">
          <img src="Images/world-map.jpg" alt="world" />
          <div class="view-para">
            <h2>200+ Cities Across</h2>
            <h2>World</h2>
          </div>
        </div>

        <div class="view-pt">
          <img src="Images/driver.jpg" alt="driver" />
          <div class="view-para">
            <h2>10,000+ DRIVER</h2>
            <h2>PARTNERS</h2>
          </div>
        </div>

      </div>

    </div>

  </main>
</body>

</html>
