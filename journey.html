<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Journies</title>
  <link rel="stylesheet" href="journey.css">
</head>

<body>
  <main>
    <nav>
      <h3>RoadCity</h3>
      <button>Sign In</button>
    </nav>
    <div class="img-bg">
      <img src="Images/paris.jpg" alt="Back-pic">
      <div class="book-bg">
        <h1>SERVICES ACROSS 200+ CITIESS</h1>
        <div class="book">
          <div class="from">
            <h2>FROM</h2>
            <input type="search" placeholder="Enter Pickup Location">
          </div>
          <div class="TO">
            <h2>TO</h2>
            <input type="search" placeholder="Enter Drop Location">
          </div>
          <div class="PICK UP DATE">
            <h2>PICK UP DATE</h2>
            <input type="date">
          </div>
          <div class="PICK UP TIME">
            <h2>PICK UP TIME</h2>
            <input type="time">
          </div>
        </div>
      </div>
    </div>
  </main>
</body>

</html>
